name: Terraform - Multi Stack Deploy

on:
  push:
    branches:
      - feature/**
      - main

permissions:
  id-token: write       # required for GitHub OIDC
  contents: read        # required for checkout

env:
  AWS_REGION: "us-east-1"
  ENVIRONMENT_STAGE: "dev"  # change default dev; can override via branch if you want

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        stack: [networking, iam-roles, eks]

    defaults:
      run:
        # working-directory relative to repo root
        working-directory: ./roots/devops-project-main
        shell: bash

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # 3️⃣ Configure AWS credentials via OIDC
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_REGION }}

      # 4️⃣ Terraform Init
      - name: Terraform Init
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          terraform init \
            -backend-config="bucket=${AWS_ACCOUNT_ID}-state-bucket-${{ env.ENVIRONMENT_STAGE }}" \
            -backend-config="key=${{ env.ENVIRONMENT_STAGE }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      # 5️⃣ Terraform Format
      - name: Terraform Format
        run: terraform fmt -check

      # 6️⃣ Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # 7️⃣ Terraform Plan
      - name: Terraform Plan
        run: terraform plan -input=false

      # # 8️⃣ Terraform Apply (only on main branch)
      # - name: Terraform Apply
      #   if: github.ref == 'refs/heads/main'
      #   run: terraform apply -auto-approve -input=false 